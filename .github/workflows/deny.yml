name: Supply chain

on:
  pull_request:
  schedule:
    # Weekly sweep so new advisories against unchanged dependencies still
    # surface between pull requests.
    - cron: "17 6 * * 1"

permissions:
  contents: read

jobs:
  cargo-deny:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install cargo-deny
        uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: cargo-deny@0.20.2
      - name: Check advisories, bans, licenses, and sources
        run: cargo deny check advisories bans licenses sources
