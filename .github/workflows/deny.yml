name: Supply chain

on:
  pull_request:
  schedule:
    # Weekly sweep so new advisories against unchanged dependencies still
    # surface between pull requests.
    - cron: "17 6 * * 1"

permissions:
  contents: read

jobs:
  cargo-deny:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          persist-credentials: false
      - name: Install cargo-deny
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: cargo-deny@0.20.2
      - name: Check advisories, bans, licenses, and sources
        run: cargo deny check advisories bans licenses sources
