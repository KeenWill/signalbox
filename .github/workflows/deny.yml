name: Supply chain

on:
  pull_request:
  schedule:
    # Weekly sweep so new advisories against unchanged dependencies still
    # surface between pull requests.
    - cron: "17 6 * * 1"

permissions:
  contents: read

jobs:
  cargo-deny:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install cargo-deny
        uses: taiki-e/install-action@c44f6b046f1c29ae5918b1e0bfdbb2f1813836fd # v2.84.1
        with:
          tool: cargo-deny@0.20.2
      - name: Check advisories, bans, licenses, and sources
        run: cargo deny check advisories bans licenses sources
