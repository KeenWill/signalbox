name: Rust

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  RUSTFLAGS: "-D warnings"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check domain spine sync
        run: python3 scripts/check_domain_spine.py
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Check Markdown formatting
        run: |
          python3 -m venv /tmp/mdformat-venv
          /tmp/mdformat-venv/bin/pip install --quiet mdformat==0.7.22 mdformat-gfm==0.4.1
          /tmp/mdformat-venv/bin/mdformat --check *.md docs/
      # Conservative inventory for the session-lock protocol recorded in the
      # 2026-07-20 decision-log entry. The checksum makes changes to the small
      # reviewed inventory explicit; the scan rejects strongest-mode row-lock
      # clauses anywhere else in production Rust. This deliberately performs
      # no Rust or SQL parsing.
      - name: Check explicit-lock inventory
        run: |
          inventory_hash="$(sha256sum \
            crates/persistence/src/lock_inventory.rs | cut -d ' ' -f 1)"
          test "$inventory_hash" = \
            d7745b9fa6388a10d668025ce7f5047d132f9e0206376ccaa01eadb116b28f81
          unexpected="$(git ls-files -z 'crates/persistence/src/*.rs' \
            | xargs -0 perl -0777 -ne '
              next if $ARGV =~ m{/lock_inventory[.]rs$};
              s{/[*].*?[*]/}{ }gs;
              s{--[^\n]*}{ }g;
              s/\s+/ /g;
              print "$ARGV\n" if /\bfor update\b/i;
            ')"
          test -z "$unexpected" || {
            printf 'explicit row lock outside inventory:\n%s\n' "$unexpected"
            exit 1
          }
      # Must run after the non-compiling checks above: a failure before any
      # compilation would otherwise save a dependency-less cache under the
      # exact key, which rust-cache never replaces on later exact-key hits.
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
      - name: Check workspace
        run: cargo check --workspace --all-targets --all-features
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Run tests
        run: cargo test --workspace --all-targets --all-features
      # `--all-targets` excludes doctests, so the domain's compile_fail
      # sealing proofs need this separate run.
      - name: Run doctests
        run: cargo test --workspace --all-features --doc
      - name: Build documentation
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --all-features --no-deps

  postgres-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
      - name: Run ephemeral Postgres integration tests
        run: >-
          cargo test -p signalbox-persistence
          --features postgres-integration
          --test postgres_integration
          -- --ignored --test-threads=1
