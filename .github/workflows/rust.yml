name: Rust

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  RUSTFLAGS: "-D warnings"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Check domain spine sync
        run: python3 scripts/check_domain_spine.py
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Check Markdown formatting
        run: |
          python3 -m venv /tmp/mdformat-venv
          /tmp/mdformat-venv/bin/pip install --quiet -r tooling/requirements-mdformat.txt
          /tmp/mdformat-venv/bin/mdformat --check *.md docs/
      # Conservative inventory for the recorded session-lock protocols. The
      # checksum makes changes to the small
      # reviewed inventory explicit; the scan rejects strongest-mode row-lock
      # clauses anywhere else in production Rust. This deliberately performs
      # no Rust or SQL parsing.
      - name: Check explicit-lock inventory
        run: |
          inventory_hash="$(sha256sum \
            crates/persistence/src/lock_inventory.rs | cut -d ' ' -f 1)"
          test "$inventory_hash" = \
            82aff1f60b03d2bccfcafc3b4110fffd48e0b7f59831567da89404b0e7c63f2f
          unexpected="$(git ls-files -z 'crates/persistence/src/*.rs' \
            | xargs -0 perl -0777 -ne '
              next if $ARGV =~ m{/lock_inventory[.]rs$};
              s{/[*].*?[*]/}{ }gs;
              s{--[^\n]*}{ }g;
              s/\s+/ /g;
              print "$ARGV\n" if /\bfor update\b/i;
            ')"
          test -z "$unexpected" || {
            printf 'explicit row lock outside inventory:\n%s\n' "$unexpected"
            exit 1
          }
      # Must run after the non-compiling checks above: a failure before any
      # compilation would otherwise save a dependency-less cache under the
      # exact key, which rust-cache never replaces on later exact-key hits.
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
      - name: Check workspace
        run: cargo check --workspace --all-targets --all-features
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Run tests
        run: cargo test --workspace --all-targets --all-features
      # `--all-targets` excludes doctests, so the domain's compile_fail
      # sealing proofs need this separate run.
      - name: Run doctests
        run: cargo test --workspace --all-features --doc
      - name: Build documentation
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --all-features --no-deps

  # GitHub-hosted Ubuntu runners provide Docker. Each suite below starts its
  # own pinned PostgreSQL containers through testcontainers.
  postgres-integration-suite:
    name: postgres-integration (${{ matrix.suite }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: persistence
            command: >-
              cargo test -p signalbox-persistence
              --features postgres-integration
              --tests
              -- --ignored --test-threads=1
          - suite: hubd
            command: >-
              cargo test -p signalbox-hubd
              --tests
              -- --ignored --test-threads=1
          - suite: terminal-client
            command: >-
              cargo test -p signalbox-client
              --test end_to_end
              terminal_client_completes_an_offline_scripted_conversation
              -- --ignored --test-threads=1
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
          key: postgres-integration-${{ matrix.suite }}
      - name: Run ${{ matrix.suite }} integration tests
        run: ${{ matrix.command }}

  # Preserve the existing required-check name while the suites run as a
  # fail-fast-disabled matrix.
  postgres-integration:
    name: postgres-integration
    if: ${{ always() }}
    needs: postgres-integration-suite
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Confirm every PostgreSQL integration suite passed
        env:
          SUITE_RESULT: ${{ needs.postgres-integration-suite.result }}
        run: test "$SUITE_RESULT" = success
