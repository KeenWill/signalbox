# Supply-chain policy checked by cargo-deny in CI
# (.github/workflows/deny.yml) on pull requests and a weekly schedule.
# Adopted by the 2026-07-20 decision-log entry.

[graph]
all-features = true

[advisories]
# Version-2 defaults: vulnerabilities, unmaintained crates, unsound crates,
# and yanked releases are all errors. Every ignore added here must carry a
# comment stating the advisory ID and the reason it is acceptable.
ignore = []

[bans]
# No crate is banned today; the list exists so a compromised or rejected
# crate can be blocked by name in one reviewed line, with a comment stating
# the reason, in the pull request that discovers the problem.
deny = []
# Duplicate versions of one crate add audit surface but appear routinely
# while transitive dependencies converge; surface them without failing CI.
multiple-versions = "warn"
# A bare "*" requirement accepts whatever version happens to resolve,
# defeating review of what actually builds. Workspace-internal path
# dependencies are exempt: every workspace crate is private
# (publish = false), so a path dependency without a version is harmless.
wildcards = "deny"
allow-wildcard-paths = true

[licenses]
# Exact allow-list for the current dependency tree (every dependency is
# MIT, Apache-2.0, or an OR-expression satisfiable by this list, plus the
# listed single-license crates). Extend deliberately when a new dependency
# introduces a new license, in the same pull request that adds it.
allow = [
  "MIT",
  "Apache-2.0",
  "ISC",
  "BSD-3-Clause",
  "Unicode-3.0",
  "Zlib",
]
# The reqwest rustls platform verifier bundles this fallback root data.
# Pinning the crate version keeps CDLA-Permissive-2.0 unavailable to every
# other present or future dependency.
exceptions = [
  { allow = ["CDLA-Permissive-2.0"], crate = "webpki-root-certs@1.0.9" },
  # serde_stacker's build-only native-stack helper uses the LLVM exception.
  # Pinning the crate version keeps that license unavailable to other crates.
  { allow = ["Apache-2.0 WITH LLVM-exception"], crate = "ar_archive_writer@0.5.2" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
